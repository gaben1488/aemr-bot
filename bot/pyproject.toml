[project]
name = "aemr-bot"
version = "0.1.0"
description = "Чат-бот Администрации Елизовского муниципального района в MAX"
requires-python = ">=3.12"
dependencies = [
    # Compatible-release (~=) pins minor versions to allow patch updates but
    # block surprise breaking changes. Re-evaluate quarterly.
    "maxapi~=0.6",
    "fastapi~=0.115",
    "uvicorn[standard]~=0.32",
    "sqlalchemy~=2.0",
    "asyncpg~=0.30",
    "alembic~=1.14",
    "apscheduler~=3.10",
    "pydantic~=2.9",
    "pydantic-settings~=2.6",
    "openpyxl~=3.1",
    "python-dotenv~=1.0",
    "aiohttp~=3.10",
]

[project.optional-dependencies]
dev = [
    "pytest~=8.3",
    "pytest-asyncio~=0.24",
    "ruff~=0.7",
    "aiosqlite~=0.20",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["aemr_bot*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
