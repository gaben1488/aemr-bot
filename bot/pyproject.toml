[project]
name = "aemr-bot"
version = "0.1.0"
description = "Чат-бот Администрации Елизовского муниципального района в MAX"
requires-python = ">=3.12"
dependencies = [
    # Compatible-release (~=) pins minor versions to allow patch updates but
    # block surprise breaking changes. Re-evaluate quarterly.
    "maxapi~=0.6",
    "fastapi~=0.115",
    "uvicorn[standard]~=0.32",
    "sqlalchemy~=2.0",
    "asyncpg~=0.30",
    "alembic~=1.14",
    "apscheduler~=3.10",
    "pydantic~=2.9",
    "pydantic-settings~=2.6",
    "openpyxl~=3.1",
    "python-dotenv~=1.0",
    "python-dateutil~=2.9",
    "aiohttp~=3.10",
    # shapely — для services/geo.py: point-in-polygon по 10 поселениям
    # ЕМО + spatial-index по зданиям. Локально, без внешних API.
    "shapely~=2.0",
]

[project.optional-dependencies]
dev = [
    # pytest 8.4.2 is vulnerable to CVE-2025-71176; keep the lower
    # bound at the first fixed release reported by pip-audit.
    "pytest>=9.0.3,<10",
    "pytest-asyncio~=0.24",
    "pytest-cov~=6.0",
    "ruff~=0.7",
    "mypy~=1.13",
    "bandit~=1.7",
    "pip-audit~=2.7",
    "aiosqlite~=0.20",
    "types-python-dateutil~=2.9",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["aemr_bot*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
# Pydantic Settings reads from env, mypy can't see the call-site validates that.
# SQLAlchemy 2.0 Result has .rowcount but its type stubs hide it on the union.
disable_error_code = ["call-arg", "attr-defined"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["aemr_bot"]
omit = [
    "aemr_bot/__main__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
precision = 1
exclude_also = [
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
